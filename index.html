<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Bullet Heist – Ricochet Arena</title>
  <meta name="description" content="Use a single bullet that ricochets off walls to hit the target. A skill-based top-down puzzle game." />
  <meta name="theme-color" content="#0a0a12" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Bullet Heist" />
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" />
</head>
<body>

  <!-- Landing Page -->
  <div id="landing-page" class="landing-page">
    <div class="landing-content">
      <h1 class="game-title">BULLET HEIST</h1>
      <div class="loading-screen">
        <div class="loading-bar">
          <div class="loading-progress"></div>
        </div>
        <p class="loading-text">Loading game assets...</p>
      </div>
      <div class="landing-buttons">
        <button id="btn-start-game" class="btn-primary">START GAME</button>
        <button id="btn-levels" class="btn-secondary">LEVELS</button>
        <button id="btn-settings" class="btn-secondary">SETTINGS</button>
      </div>
    </div>
  </div>

  <!-- Game Elements (Hidden by default) -->
  <h1 id="game-title" class="hidden">BULLET HEIST</h1>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div class="hud-item">
      <div class="hud-label">Bounces</div>
      <div class="hud-val" id="hud-bounces">0</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">Shots Left</div>
      <div class="hud-val" id="hud-shots">1</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">Level</div>
      <div class="hud-val" id="hud-level">1</div>
    </div>
  </div>

  <!-- Level name strip -->
  <div id="level-name-bar" class="hidden">
    <span id="level-name">1. The Bank Shot</span>
  </div>

  <!-- Arena -->
  <div id="arena-wrap" class="hidden">
    <canvas id="c" width="800" height="560"></canvas>

    <!-- Win / Lose overlay -->
    <div id="overlay" class="overlay hidden">
      <h2 id="overlay-title">YOU WIN!</h2>
      <p  id="overlay-msg">The bullet found its mark.</p>
      <button id="overlay-btn">PLAY AGAIN</button>
    </div>
  </div>

  <!-- Status -->
  <div id="status-bar" class="hidden">
    <span>🎯 Drag</span> from the bullet and release to fire
  </div>

  <!-- Controls -->
  <div id="btn-row" class="hidden">
    <button id="btn-reset">RESET</button>
    <button id="btn-levels-menu">LEVELS</button>
    <button id="btn-theme">NEON</button>
    <button id="btn-fullscreen" title="Fullscreen / Landscape">⛶</button>
  </div>

  <!-- Portrait hint (visible only on narrow portrait phones) -->
  <div id="portrait-hint">↻ Rotate for best experience</div>

  <!-- Level Select Modal -->
  <div id="level-select" class="modal hidden">
    <div id="ls-overlay"></div>
    <div id="ls-panel">
      <div id="ls-header">
        <span id="ls-title">SELECT LEVEL</span>
        <button id="ls-close">✕</button>
      </div>
      <div id="ls-grid"></div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal hidden">
    <div id="settings-overlay"></div>
    <div id="settings-panel">
      <div id="settings-header">
        <span id="settings-title">SETTINGS</span>
        <button id="settings-close">✕</button>
      </div>
      <div id="settings-content">
        <div class="setting-item">
          <label for="sound-toggle">Sound</label>
          <button id="sound-toggle" class="toggle-btn">ON</button>
        </div>
        <div class="setting-item">
          <label for="music-toggle">Music</label>
          <button id="music-toggle" class="toggle-btn">ON</button>
        </div>
        <div class="setting-item">
          <label for="difficulty">Difficulty</label>
          <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard</option>
          </select>
        </div>
        <div class="setting-item">
          <label for="theme-select">Theme</label>
          <select id="theme-select">
            <option value="neon">Neon</option>
            <option value="arcade">Arcade</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
