<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Bullet Heist – Ricochet Arena</title>
  <meta name="description" content="Use a single bullet that ricochets off walls to hit the target. A skill-based top-down puzzle game." />
  <meta name="theme-color" content="#0a0a12" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Bullet Heist" />
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" />
</head>
<body>

  <!-- ══════════════════════════════════════════════════════════
       SCREEN: LANDING
       ══════════════════════════════════════════════════════════ -->
  <div id="screen-landing" class="screen active">
    <div class="landing-content">
      <h1 class="game-title">BULLET HEIST</h1>
      <p class="game-subtitle">One bullet. One shot. Infinite angles.</p>

      <div id="loading-screen" class="loading-screen">
        <div class="loading-bar"><div id="loading-progress" class="loading-progress"></div></div>
        <p class="loading-text">Loading…</p>
      </div>

      <div id="landing-buttons" class="landing-buttons hidden">
        <button id="btn-start-game"  class="btn-primary">▶ START GAME</button>
        <button id="btn-tutorial"    class="btn-secondary">📖 TUTORIAL</button>
        <button id="btn-levels-land" class="btn-secondary">🗺 LEVELS</button>
        <button id="btn-settings-land" class="btn-secondary">⚙ SETTINGS</button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════
       SCREEN: LEVEL SELECT (paginated)
       ══════════════════════════════════════════════════════════ -->
  <div id="screen-levels" class="screen">
    <div class="ls-screen-inner">
      <div class="ls-screen-header">
        <button id="ls-back" class="icon-btn">← BACK</button>
        <h2 id="ls-screen-title" class="ls-screen-title">LEVELS</h2>
        <span id="ls-page-indicator" class="ls-page-indicator">1 / 1</span>
      </div>

      <!-- Sliding viewport -->
      <div class="ls-viewport">
        <div id="ls-pages-track" class="ls-pages-track">
          <!-- Pages injected by JS -->
        </div>
      </div>

      <!-- Page nav dots + arrows -->
      <div class="ls-page-nav">
        <button id="ls-prev" class="ls-arrow" aria-label="Previous page">←</button>
        <div id="ls-dots" class="ls-dots"></div>
        <button id="ls-next" class="ls-arrow" aria-label="Next page">→</button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════
       SCREEN: GAME (full-screen arena)
       ══════════════════════════════════════════════════════════ -->
  <div id="screen-game" class="screen">

    <!-- Thin top bar: level info + action buttons -->
    <div id="game-topbar">
      <span id="game-mode-badge" class="mode-badge">TUTORIAL</span>
      <span id="topbar-level-name" class="topbar-level-name">1. The Bank Shot</span>
      <div class="topbar-actions">
        <button id="btn-reset-top" class="topbar-btn" title="Reset">↺</button>
        <button id="btn-pause"     class="topbar-btn" title="Pause">⏸</button>
      </div>
    </div>

    <!-- HUD strip -->
    <div id="hud">
      <div class="hud-item">
        <div class="hud-label">Bounces</div>
        <div class="hud-val" id="hud-bounces">0</div>
      </div>
      <div class="hud-item">
        <div class="hud-label">Shots</div>
        <div class="hud-val" id="hud-shots">1</div>
      </div>
      <div class="hud-item">
        <div class="hud-label">Par</div>
        <div class="hud-val" id="hud-par">2</div>
      </div>
    </div>

    <!-- Arena — fills remaining screen -->
    <div id="arena-wrap">
      <canvas id="c" width="800" height="560"></canvas>

      <!-- Win / Lose overlay (inside canvas) -->
      <div id="overlay">
        <h2 id="overlay-title">TARGET HIT!</h2>
        <p  id="overlay-msg">Nice shot.</p>
        <div class="overlay-btns">
          <button id="overlay-next">NEXT LEVEL</button>
          <button id="overlay-retry">RETRY</button>
        </div>
      </div>
    </div>

    <!-- Status hint below canvas -->
    <div id="status-bar"><span>🎯 Drag</span> from the bullet to aim</div>

    <!-- ── PAUSE OVERLAY ─────────────────────────────── -->
    <div id="pause-overlay">
      <div id="pause-panel">
        <h2 class="pause-title">PAUSED</h2>

        <div class="pause-section">
          <div class="pause-label">THEME</div>
          <div id="pause-theme-btns" class="pause-theme-grid"></div>
        </div>

        <div class="pause-section">
          <div class="pause-label">LEVEL</div>
          <div class="pause-level-info" id="pause-level-info">1. The Bank Shot</div>
        </div>

        <div class="pause-actions">
          <button id="pause-resume"   class="pause-btn pause-btn-accent">▶ RESUME</button>
          <button id="pause-levels"   class="pause-btn">🗺 LEVELS</button>
          <button id="pause-settings" class="pause-btn">⚙ SETTINGS</button>
          <button id="pause-home"     class="pause-btn">🏠 HOME</button>
        </div>
      </div>
    </div>

  </div><!-- /screen-game -->

  <!-- ══════════════════════════════════════════════════════════
       MODAL: SETTINGS (appears on top of any screen)
       ══════════════════════════════════════════════════════════ -->
  <div id="settings-modal" class="modal-overlay hidden">
    <div id="settings-panel" class="modal-panel">
      <div class="modal-header">
        <span class="modal-title">SETTINGS</span>
        <button id="settings-close" class="icon-btn small">✕</button>
      </div>
      <div class="setting-item">
        <label>Sound</label>
        <button id="sound-toggle" class="toggle-btn">ON</button>
      </div>
      <div class="setting-item">
        <label>Music</label>
        <button id="music-toggle" class="toggle-btn">ON</button>
      </div>
      <div class="setting-item">
        <label>Theme</label>
        <select id="theme-select">
          <option value="neon">Neon</option>
          <option value="arcade">Arcade</option>
        </select>
      </div>
      <div class="setting-item">
        <label>Fullscreen</label>
        <button id="btn-fullscreen" class="toggle-btn">⛶</button>
      </div>
    </div>
  </div>

  <!-- Portrait hint -->
  <div id="portrait-hint">↻ Rotate for best experience</div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
